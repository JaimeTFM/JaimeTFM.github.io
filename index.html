        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // add class to format popup if it contains media
		function addClassToPopupIfMedia(content, popup) {
			var tempDiv = document.createElement('div');
			tempDiv.innerHTML = content;
			if (tempDiv.querySelector('td img')) {
				popup._contentNode.classList.add('media');
					// Delay to force the redraw
					setTimeout(function() {
						popup.update();
					}, 10);
			} else {
				popup._contentNode.classList.remove('media');
			}
		}
        var zoomControl = L.control.zoom({

        var measureControl = new L.Control.Measure({
            position: 'topleft',
            primaryLengthUnit: 'meters',

            primaryAreaUnit: 'sqmeters',

        // Configuración WFS
        const wfsBaseUrl = 'https://geoserver-on-render-production.up.railway.app/geoserver/ows';

        // Variables globales para mantener los datos originales de las capas para el filtrado
        // La función filterFunc espera que estos objetos existan y contengan un array 'features'.
        window.json_ZONAS_VERDES_3 = { "type": "FeatureCollection", "features": [] };
        window.json_ARBOLADO_4 = { "type": "FeatureCollection", "features": [] };

        /**
         * Fetches GeoJSON data from a WFS service.
         * @param {string} typeName - The fully qualified name of the WFS layer (e.g., 'namespace:layername').
         * @returns {Promise<Array<Object>>} A promise that resolves to an array of GeoJSON features.
         */
        async function fetchWfsData(typeName) {
            const url = `${wfsBaseUrl}?service=WFS&version=1.1.0&request=GetFeature&typeName=${typeName}&outputFormat=application/json`;
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                console.log(`Datos obtenidos para ${typeName}. Número de features: ${data.features ? data.features.length : 0}`);
                return data.features || [];
            } catch (error) {
                console.error(`Error al obtener datos WFS para ${typeName}:`, error);
                return [];
            }
        }

        /**
         * Loads and displays WFS layers on the map.

        async function loadAndDisplayWfsLayers() {
            // Cargar y almacenar las features originales de ZONAS_VERDES
            const fetchedZonasVerdesFeatures = await fetchWfsData(wfsLayers['ZONAS_VERDES']);

            map.addLayer(layer_ZONAS_VERDES_3); // Añadir capa al mapa

            // Ajustar el mapa a los límites de todas las features cargadas
            setBounds();

        var Filters = {"ESPECIE": "str","ACTUACION PENDIENTE": "str","TIPO_ZV": "str","ACTUACION PENDIENTE ZZVV": "str"};
        function filterFunc() {
          map.eachLayer(function(lyr){
          if ("options" in lyr && "dataVar" in lyr["options"]){
            // Asegurarse de que `this[lyr["options"]["dataVar"]]` esté disponible y tenga `features`
            if (this[lyr["options"]["dataVar"]] && this[lyr["options"]["dataVar"]].features) {
                features = this[lyr["options"]["dataVar"]].features.slice(0); // Trabajar con una copia de los datos originales
                try{
                  for (key in Filters){
                    keyS = key.replace(/[^a-zA-Z0-9_]/g, "")
                    if (Filters[key] == "str" || Filters[key] == "bool"){
                      var selection = [];
                      var options = document.getElementById("sel_" + keyS).options
                      for (var i=0; i < options.length; i++) {
                        if (options[i].selected) selection.push(options[i].value);
                      }
                        try{
                          if (key in features[0].properties){
                            for (i = features.length - 1;
                              i >= 0; --i){
                              if (selection.indexOf(
                              features[i].properties[key])<0
                              && selection.length>0) {
                              features.splice(i,1);
                              }
                            }
                          }
                        } catch(err){
                            console.error("Error en filtro de cadena para " + key + ":", err);
                      }
                    }
                    if (Filters[key] == "int"){
                      sliderVals =  document.getElementById(
                        "div_" + keyS).noUiSlider.get();
                      try{
                        if (key in features[0].properties){
                        for (i = features.length - 1; i >= 0; --i){
                          if (parseInt(features[i].properties[key])
                              < sliderVals[0]
                              || parseInt(features[i].properties[key])
                              > sliderVals[1]){
                                features.splice(i,1);
                              }
                            }
                          }
                        } catch(err){
                            console.error("Error en filtro de entero para " + key + ":", err);
                        }
                      }
                    if (Filters[key] == "real"){
                      sliderVals =  document.getElementById(
                        "div_" + keyS).noUiSlider.get();
                      try{
                        if (key in features[0].properties){
                        for (i = features.length - 1; i >= 0; --i){
                          if (features[i].properties[key]
                              < sliderVals[0]
                              || features[i].properties[key]
                              > sliderVals[1]){
                                features.splice(i,1);
                              }
                            }
                          }
                        } catch(err){
                            console.error("Error en filtro real para " + key + ":", err);
                        }
                      }
                    if (Filters[key] == "date"
                      || Filters[key] == "datetime"
                      || Filters[key] == "time"){
                      try{
                        if (key in features[0].properties){
                          HTMLkey = key.replace(/[&\/\\#,+()$~%.'":*?<>{} ]/g, '');
                          startdate = document.getElementById("dat_" +
                            HTMLkey + "_date1").value.replace(" ", "T");
                          enddate = document.getElementById("dat_" +
                            HTMLkey + "_date2").value.replace(" ", "T");
                          for (i = features.length - 1; i >= 0; --i){
                            if (features[i].properties[key] < startdate
                              || features[i].properties[key] > enddate){
                              features.splice(i,1);
                            }
                          }
                        }
                      } catch(err){
                        console.error("Error en filtro de fecha para " + key + ":", err);
                      }
                    }
                  }
                } catch(err){
                    console.error("Error general en filterFunc:", err);
                }
              this[lyr["options"]["layerName"]].clearLayers();
              this[lyr["options"]["layerName"]].addData(features);
            }
          }
