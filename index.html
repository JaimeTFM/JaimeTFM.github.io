        // Remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var rows = tempDiv.querySelectorAll('tr');
            for (var i = 0; i < rows.length; i++) {
                var td = rows[i].querySelector('td.visible-with-data');
                var key = td ? td.id : '';
                if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                    rows[i].parentNode.removeChild(rows[i]);
                }
            }
            return tempDiv.innerHTML;
        }
        
        // Add class to format popup if it contains media
		function addClassToPopupIfMedia(content, popup) {
			var tempDiv = document.createElement('div');
			tempDiv.innerHTML = content;
			if (tempDiv.querySelector('td img')) {
				popup._contentNode.classList.add('media');
					// Delay to force the redraw
					setTimeout(function() {
						popup.update();
					}, 10);
			} else {
				popup._contentNode.classList.remove('media');
			}

        // --- Helper function to fetch GeoJSON and create layer ---
        async function fetchGeoJsonLayer(wfsUrl, layerName, srsName, popupFunction, styleFunction, paneName) {
            const requestUrl = `${wfsUrl}request=GetFeature&typename=${layerName}&outputFormat=application/json&srsname=${srsName}&version=1.1.0`; // Ensure version is included
            
            try {
                console.log(`Fetching GeoJSON for ${layerName} from: ${requestUrl}`);
                const response = await fetch(requestUrl);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status} for ${layerName}`);
                }
                const geojsonData = await response.json();
                console.log(`Fetched ${geojsonData.features.length} features for ${layerName}`);

                // Create L.geoJson layer
                const geoJsonLayer = new L.geoJson(geojsonData, {
                    onEachFeature: popupFunction,
                    style: styleFunction,
                    pane: paneName,
                    // Store layer name and dataVar for filterFunc
                    dataVar: `json_${layerName.replace(':', '_').replace('-', '_')}`, 
                    layerName: `layer_${layerName.replace(':', '_').replace('-', '_')}`,
                    pointToLayer: function (feature, latlng) { // Needed for point layers like ARBOLADO
                        if (layerName === "Supabase:ARBOLADO") {
                            return L.circleMarker(latlng, style_ARBOLADO_4_0(feature));
                        }
                        return L.marker(latlng); // Default for other point layers
                    },
                });

                // Make the fetched data accessible globally for filterFunc
                window[`json_${layerName.replace(':', '_').replace('-', '_')}`] = geojsonData;

                return geoJsonLayer;

            } catch (error) {
                console.error(`Error fetching GeoJSON for ${layerName}:`, error);
                return null; // Return null if fetching fails
            }
        }

        var Filters = {"Ubicación": "str","Tipo Arb": "str","CATRISK": "str","Especie": "str", "ESPECIE": "str", "ACTUACION PENDIENTE": "str", "TIPO_ZV": "str", "ACTUACION PENDIENTE ZZVV": "str"};

        function filterFunc() {
            map.eachLayer(function(lyr){
                // Only apply client-side filters to L.geoJson layers (ARBOLADO and ZONAS_VERDES)
                if (lyr instanceof L.GeoJSON && "options" in lyr && "dataVar" in lyr["options"]){
                    let originalFeatures = window[lyr.options.dataVar].features.slice(0); // Get original data
                    let filteredFeatures = originalFeatures.slice(0); // Start with all features for this layer

                    for (let key in Filters){
                        let keyS = key.replace(/[^a-zA-Z0-9_]/g, ""); // Sanitize key for ID lookup
                        let filterType = Filters[key];
                        
                        let selectElement = document.getElementById("sel_" + keyS);
                        
                        if (selectElement && (filterType === "str" || filterType === "bool")) {
                            let selection = [];
                            for (let i = 0; i < selectElement.options.length; i++) {
                                if (selectElement.options[i].selected) {
                                    selection.push(selectElement.options[i].value);
                                }
                            }
                            
                            if (selection.length > 0) {
                                filteredFeatures = filteredFeatures.filter(feature => {
                                    // Check if property exists and its value is in the selection
                                    return feature.properties.hasOwnProperty(key) && selection.includes(String(feature.properties[key]));
                                });
                            }
                        }
                        // Add more filter types (int, real, date) if needed, following similar logic
                    }
                    lyr.clearLayers();
                    lyr.addData(filteredFeatures);
                }
            });
            updateTreeCount();
        }
