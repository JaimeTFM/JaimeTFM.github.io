<script>
function cargarCapaWFS(nombre, paneName, estilo, popup, pointToLayer = null, layerName = null) {
    const url = `https://wms.qgiscloud.com/jaimequinterotfm/PROYECTO_TFM_GIS_FINAL/?service=WFS&version=1.0.0&request=GetFeature&typeName=${nombre}&outputFormat=application/json&srsname=EPSG:4326`;

    fetch(url)
        .then(r => r.json())
        .then(geojson => {
            const capa = L.geoJSON(geojson, {
                pane: paneName,
                style: estilo,
                onEachFeature: popup,
                pointToLayer: pointToLayer
            });
            bounds_group.addLayer(capa);
            map.addLayer(capa);

            if (layerName) {
                window[layerName] = capa;
                lay._update();
            }
        })
        .catch(error => console.error("Error al cargar WFS:", error));
}

window.addEventListener('load', function () {
    setTimeout(() => {
        cargarCapaWFS("ZONAS_VERDES", "pane_ZONAS_VERDES_2", style_ZONAS_VERDES_2_0, pop_ZONAS_VERDES_2, null, "layer_ZONAS_VERDES_2");
        cargarCapaWFS("ARBOLADO", "pane_ARBOLADO_3", style_ARBOLADO_3_0, pop_ARBOLADO_3,
            function (feature, latlng) {
                return L.circleMarker(latlng, style_ARBOLADO_3_0(feature));
            }, "layer_ARBOLADO_3");
    }, 1000);
});
</script></body>
